# Render Blueprint — Backend API
# Dashboard: New → Blueprint → connect
# https://github.com/maneeshmkp/Travel-Itinerary-Application-System
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: travelplan-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    healthCheckPath: /api/health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: LOG_LEVEL
        value: info
      - key: STORAGE_PROVIDER
        value: s3
      # Render injects PORT automatically — do not hardcode
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_PREFIX
        value: travel-documents
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
