<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("travelplan-theme");
          if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/pwa/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelPlan — AI Travel Management Platform</title>
    <meta
      name="description"
      content="Plan trips with AI itineraries, Copilot, bookings, expenses, flight tracking, maps, weather, and a secure document vault. MERN, Redis, BullMQ, Docker."
    />
    <meta name="keywords" content="TravelPlan, AI itinerary, travel management, expense tracker, flight tracking, MERN SaaS" />
    <link rel="canonical" href="/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TravelPlan" />
