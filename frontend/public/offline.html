<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — TravelPlan</title>
    <meta name="theme-color" content="#15803d" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, #f0fdf4, #ecfdf5);
        color: #14532d;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        text-align: center;
        background: #fff;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      }
      h1 { font-size: 1.5rem; margin: 0 0 8px; }
      p { color: #4b5563; line-height: 1.6; }
      a {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background: #15803d;
        color: #fff;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>TravelPlan saved your downloaded trips and pending changes. Reconnect to sync automatically.</p>
      <a href="/">Open TravelPlan</a>
    </div>
  </body>
</html>
