# TravelPlan — one-command local stack
# Usage:
#   cp .env.docker.example .env.docker
#   docker compose --env-file .env.docker up --build
#
# Services: frontend (nginx:3000), backend (5000), mongo, redis

name: travelplan

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    networks:
      - travelplan_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    networks:
      - travelplan_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/${MONGO_DB_NAME:-travelplan}
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-change-me-local-docker-secret-min-32-chars}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_GEOCODING_API_KEY: ${GOOGLE_GEOCODING_API_KEY:-}
      SERPAPI_KEY: ${SERPAPI_KEY:-}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_PREFIX: ${AWS_S3_PREFIX:-travel-documents}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${BACKEND_HOST_PORT:-5000}:5000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - travelplan_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
        VITE_MAP_PROVIDER: ${VITE_MAP_PROVIDER:-auto}
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - travelplan_net

volumes:
  mongo_data:
  redis_data:
  backend_uploads:
  backend_logs:

networks:
  travelplan_net:
    driver: bridge
