name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  quality:
    name: Gate — lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json
      - run: npm ci
      - run: npm ci
        working-directory: backend
      - run: npm ci
        working-directory: frontend
      - run: npm run format:check
      - run: npm run lint
        working-directory: backend
      - run: npm run lint
        working-directory: frontend
      - run: npm test
        working-directory: backend
      - run: npm test
        working-directory: frontend
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SOCKET_URL: ${{ secrets.VITE_SOCKET_URL }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_MAP_PROVIDER: ${{ secrets.VITE_MAP_PROVIDER }}
        run: |
          export VITE_MAP_PROVIDER="${VITE_MAP_PROVIDER:-auto}"
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  e2e-critical:
    name: Critical E2E gate
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 40
    if: ${{ secrets.E2E_MONGO_URI != '' || secrets.MONGO_URI != '' || secrets.MONGODB_URI != '' }}
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json
      - run: npm ci
      - run: npm ci
        working-directory: backend
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install chromium --with-deps
      - name: Prepare backend env
        working-directory: backend
        env:
          E2E_MONGO_URI: ${{ secrets.E2E_MONGO_URI }}
          MONGO_URI_SECRET: ${{ secrets.MONGO_URI }}
          MONGODB_URI_SECRET: ${{ secrets.MONGODB_URI }}
          JWT_SECRET_VALUE: ${{ secrets.JWT_SECRET }}
        run: |
          MONGO_URI="${E2E_MONGO_URI:-${MONGO_URI_SECRET:-$MONGODB_URI_SECRET}}"
          JWT_SECRET="${JWT_SECRET_VALUE:-e2e-ci-jwt-secret-change-me}"
          if [ -z "$MONGO_URI" ]; then echo "Missing Mongo URI secret"; exit 1; fi
          cat > .env <<EOF
          MONGO_URI=${MONGO_URI}
          MONGODB_URI=${MONGO_URI}
          JWT_SECRET=${JWT_SECRET}
          JWT_EXPIRE=1d
          PORT=5000
          NODE_ENV=test
          FRONTEND_URL=http://127.0.0.1:3000
          REDIS_URL=redis://127.0.0.1:6379
          EOF
      - name: Critical E2E
        env:
          CI: "true"
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_API_URL: http://127.0.0.1:5000/api
        run: npm run test:e2e:critical
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-deploy
          path: |
            playwright-report
            test-results
          retention-days: 7

  docker-publish:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: [quality, e2e-critical]
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && always() && needs.quality.result == 'success' && (needs.e2e-critical.result == 'success' || needs.e2e-critical.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ secrets.GITHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image names
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=ghcr.io/${OWNER}/travelplan-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${OWNER}/travelplan-frontend" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend }}:latest
            ${{ steps.meta.outputs.backend }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend }}:latest
            ${{ steps.meta.outputs.frontend }}:${{ steps.meta.outputs.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_SOCKET_URL=${{ secrets.VITE_SOCKET_URL }}
            VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
            VITE_MAP_PROVIDER=auto
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-backend-render:
    name: Deploy backend (Render)
    runs-on: ubuntu-latest
    needs: quality
    environment: production
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK not set — skip Render deploy"
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
          echo "Render deploy triggered"

  deploy-frontend-vercel:
    name: Deploy frontend (Vercel)
    runs-on: ubuntu-latest
    needs: quality
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g vercel@39
      - name: Pull & deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Vercel secrets not fully configured — skip Vercel deploy"
            exit 0
          fi
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
