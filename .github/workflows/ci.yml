name: CI

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install root tooling (Prettier)
        run: npm ci

      - name: Install backend
        working-directory: backend
        run: npm ci

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Prettier check (infra)
        run: npm run format:check

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test backend
        working-directory: backend
        run: npm test

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: /api
          VITE_MAP_PROVIDER: auto
        run: npm run build

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  e2e-critical:
    name: Critical E2E (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 40
    if: ${{ secrets.E2E_MONGO_URI != '' || secrets.MONGO_URI != '' || secrets.MONGODB_URI != '' }}
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json
      - run: npm ci
      - run: npm ci
        working-directory: backend
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install chromium --with-deps
      - name: Prepare backend env
        working-directory: backend
        env:
          E2E_MONGO_URI: ${{ secrets.E2E_MONGO_URI }}
          MONGO_URI_SECRET: ${{ secrets.MONGO_URI }}
          MONGODB_URI_SECRET: ${{ secrets.MONGODB_URI }}
          JWT_SECRET_VALUE: ${{ secrets.JWT_SECRET }}
        run: |
          MONGO_URI="${E2E_MONGO_URI:-${MONGO_URI_SECRET:-$MONGODB_URI_SECRET}}"
          JWT_SECRET="${JWT_SECRET_VALUE:-e2e-ci-jwt-secret-change-me}"
          if [ -z "$MONGO_URI" ]; then echo "Missing Mongo URI secret"; exit 1; fi
          cat > .env <<EOF
          MONGO_URI=${MONGO_URI}
          MONGODB_URI=${MONGO_URI}
          JWT_SECRET=${JWT_SECRET}
          JWT_EXPIRE=1d
          PORT=5000
          NODE_ENV=test
          FRONTEND_URL=http://127.0.0.1:3000
          REDIS_URL=redis://127.0.0.1:6379
          EOF
      - name: Run critical Playwright suite
        env:
          CI: "true"
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_API_URL: http://127.0.0.1:5000/api
        run: npm run test:e2e:critical
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ci
          path: |
            playwright-report
            test-results
          retention-days: 7

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [quality, e2e-critical]
    if: ${{ always() && needs.quality.result == 'success' && (needs.e2e-critical.result == 'success' || needs.e2e-critical.result == 'skipped') }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: travelplan-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: travelplan-frontend:ci
          build-args: |
            VITE_API_URL=/api
            VITE_MAP_PROVIDER=auto
          cache-from: type=gha
          cache-to: type=gha,mode=max
