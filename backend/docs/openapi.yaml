openapi: 3.1.0
info:
  title: TravelPlan API
  version: 1.0.0
  description: >-
    # TravelPlan Public API


    Production-grade AI travel management API.


    ## Versioning


    - **Current:** `/api/v1`

    - **Legacy (compatible):** `/api` (same handlers; receives `X-API-Version:
    1`)


    Prefer `/api/v1` for all new integrations.


    ## Authentication


    Most endpoints require a JWT Bearer token from `POST /api/v1/auth/login` or
    signup.


    ```

    Authorization: Bearer <token>

    ```


    Admin monitoring APIs additionally require an admin role (`User.role=admin`
    or `ADMIN_EMAILS`).


    ## Rate limits


    Redis-backed limits (fail-open if Redis is down):


    | Scope | Limit |

    |-------|-------|

    | Login | 10 / minute |

    | Signup | 10 / minute |

    | Forgot password | 5 / minute |

    | AI endpoints | 20 / hour |

    | Public weather | 60 / minute |


    Responses may include `X-RateLimit-*` headers. HTTP **429** when exceeded.


    ## Errors


    Error bodies use:


    ```json

    { "success": false, "code": "ERROR_CODE", "message": "Human readable",
    "error": "..." }

    ```
  contact:
    name: TravelPlan API
    email: hello@travelplan.com
  license:
    name: Proprietary
    identifier: LicenseRef-TravelPlan-Proprietary
servers:
  - url: http://localhost:5000
    description: Local development (paths include /api/v1)
  - url: https://api.travelplan.example
    description: Production host (example)
tags:
  - name: Health
    description: Liveness and dependency health
  - name: Authentication
    description: Signup, login, password reset, current user
  - name: Trips
    description: Itineraries / trips CRUD, save, collaborate, expenses on trips
  - name: Bookings
    description: Flight/hotel/activity booking tracker
  - name: Expenses
    description: Trip expense tracker (via itineraries)
  - name: Documents
    description: Travel document vault (S3)
  - name: Notifications
    description: In-app notifications and settings
  - name: Weather
    description: Current weather and forecasts (cached)
  - name: Maps
    description: Nearby places / map recommendations
  - name: Recommendations
    description: Destination and trip recommendations
  - name: Analytics
    description: Travel analytics dashboard and exports
  - name: AI
    description: AI itinerary, enrichment, and copilots (rate limited)
  - name: Copilot
    description: Travel Copilot chat sessions
  - name: Flight Tracking
    description: Live flight status and tracking
  - name: Calendar
    description: Google / Outlook calendar sync
  - name: Packing
    description: AI packing lists
  - name: Risk
    description: Trip risk analysis
  - name: Budget
    description: AI budget optimizer
  - name: Availability
    description: Hotel/flight/train/bus/activity search
  - name: Blogs
    description: Public travel blogs
  - name: Monitoring
    description: Admin-only observability
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT from /auth/login or /auth/signup. Send as `Authorization:
        Bearer <token>`."
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data: {}
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        code:
          type: string
          example: UNAUTHORIZED
        message:
          type: string
        error:
          type: string
    User:
      type: object
      properties:
        _id:
          type: string
          example: 507f1f77bcf86cd799439011
        name:
          type: string
          example: Ada Lovelace
        email:
          type: string
          format: email
          example: ada@example.com
        role:
          type: string
          enum:
            - user
            - admin
          example: user
        createdAt:
          type: string
          format: date-time
    AuthTokenResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        token:
          type: string
          description: JWT access token
        user:
          $ref: "#/components/schemas/User"
    Trip:
      type: object
      description: Itinerary / trip document
      properties:
        _id:
          type: string
        title:
          type: string
          example: Tokyo Spring Escape
        destination:
          type: string
          example: Tokyo, Japan
        numberOfNights:
          type: integer
          example: 4
        totalDays:
          type: integer
          example: 5
        description:
          type: string
        budget:
          type: object
          properties:
            min:
              type: number
            max:
              type: number
            currency:
              type: string
              example: USD
        highlights:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        days:
          type: array
          items:
            type: object
        ownerId:
          type: string
        collaboration:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Booking:
      type: object
      properties:
        _id:
          type: string
        tripId:
          type: string
        bookingType:
          type: string
          enum:
            - flight
            - hotel
            - activity
            - train
            - bus
            - other
        provider:
          type: string
          example: Air India
        bookingReference:
          type: string
        confirmationNumber:
          type: string
        status:
          type: string
        paymentStatus:
          type: string
        price:
          type: number
        currency:
          type: string
        flightNumber:
          type: string
        checkIn:
          type: string
          format: date-time
        checkOut:
          type: string
          format: date-time
        departureDate:
          type: string
          format: date-time
    Expense:
      type: object
      properties:
        _id:
          type: string
        itineraryId:
          type: string
        userId:
          type: string
        amount:
          type: number
          example: 42.5
        currency:
          type: string
          example: USD
        category:
          type: string
          example: food
        description:
          type: string
          example: Lunch at café
        dayNumber:
          type: integer
        paymentMethod:
          type: string
        createdAt:
          type: string
          format: date-time
    Notification:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          example: TRIP_CREATED
        category:
          type: string
        title:
          type: string
        message:
          type: string
        priority:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
            - CRITICAL
        status:
          type: string
          enum:
            - UNREAD
            - READ
            - ARCHIVED
        read:
          type: boolean
        actionUrl:
          type: string
        trip:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    Document:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
          example: Passport scan
        documentType:
          type: string
          example: passport
        tripId:
          type: string
          nullable: true
        country:
          type: string
        expiryDate:
          type: string
          format: date-time
          nullable: true
        isFavorite:
          type: boolean
        mimeType:
          type: string
        storageProvider:
          type: string
          example: s3
        createdAt:
          type: string
          format: date-time
    Weather:
      type: object
      properties:
        destination:
          type: string
        location:
          type: string
        date:
          type: string
          format: date
        condition:
          type: string
          example: Clear
        tempC:
          type: number
        humidity:
          type: number
        demo:
          type: boolean
    Analytics:
      type: object
      properties:
        exists:
          type: boolean
        totalTrips:
          type: integer
        travelScore:
          type: number
        totalSpent:
          type: number
        charts:
          type: object
        heatmap:
          type: array
          items:
            type: object
        insights:
          type: array
          items:
            type: string
    AIResponse:
      type: object
      properties:
        success:
          type: boolean
        demo:
          type: boolean
          description: True when demo/fallback model used
        data:
          type: object
        message:
          type: string
    SignupRequest:
      type: object
      required:
        - name
        - email
        - password
        - confirmPassword
      properties:
        name:
          type: string
          minLength: 2
          example: Ada Lovelace
        email:
          type: string
          format: email
          example: ada@example.com
        password:
          type: string
          minLength: 6
          example: Secret123!
        confirmPassword:
          type: string
          minLength: 6
          example: Secret123!
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: ada@example.com
        password:
          type: string
          example: Secret123!
    CreateBookingRequest:
      type: object
      required:
        - tripId
        - bookingType
      properties:
        tripId:
          type: string
        bookingType:
          type: string
          enum:
            - flight
            - hotel
            - activity
            - train
            - bus
            - other
        provider:
          type: string
        bookingReference:
          type: string
        price:
          type: number
        currency:
          type: string
        flightNumber:
          type: string
    CreateExpenseRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: number
          example: 25
        currency:
          type: string
          example: USD
        category:
          type: string
          example: food
        description:
          type: string
        dayNumber:
          type: integer
          example: 1
        paymentMethod:
          type: string
          example: card
    HealthResponse:
      type: object
      properties:
        success:
          type: boolean
        status:
          type: string
          enum:
            - healthy
            - degraded
            - unhealthy
        color:
          type: string
        timestamp:
          type: string
          format: date-time
        services:
          type: object
        memory:
          type: object
        metrics:
          type: object
  parameters:
    ObjectId:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-fA-F0-9]{24}$
